server:
  port: 8083

spring:
  application:
    name: microservicio-pedidos

  # Configuración de Base de Datos H2 propia para Pedidos
  datasource:
    url: jdbc:h2:mem:perfulandia_pedidos_db
    driverClassName: org.h2.Driver
    username: sa
    password: 

  # Consola H2 para revisar las tablas de pedidos de forma independiente
  h2:
    console:
      enabled: true
      path: /h2-console

  # Mostrar las sentencias SQL en la consola para depuración
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    # Truco de Spring Boot 3.x para evitar que intente buscar tablas antes de que Hibernate las cree
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

# Registro en el Servidor Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/