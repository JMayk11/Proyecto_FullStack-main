server:
  port: 8090

spring:
  application:
    name: microservicio-usuarios

  # Configuración de H2 Database para Usuarios
  datasource:
    url: jdbc:h2:mem:perfulandia_usuarios_db
    driverClassName: org.h2.Driver
    username: sa
    password: 

  # Habilitar la consola web de H2
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    # Forzamos a que Spring use data.sql DESPUÉS de que Hibernate cree las tablas
    defer-datasource-initialization: true

  # Carga de datos iniciales script data.sql o import.sql
  sql:
    init:
      mode: always

# Configuración de Eureka Client
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/