server:
  port: 8087

spring:
  application:
    name: microservicio-proveedores
  datasource:
    url: jdbc:h2:mem:proveedoresdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/