server:
  port: 8085

spring:
  application:
    name: microservicio-stock

  # Configuración de H2 Database para Stock
  datasource:
    url: jdbc:h2:mem:perfulandia_stock_db
    driverClassName: org.h2.Driver
    username: sa
    password: 

  # Habilitar la consola web de H2
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate configuration
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

# Configuración de Eureka Client
eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/