server:
  port: 8088

spring:
  application:
    name: microservicio-soporte
  datasource:
    url: jdbc:h2:mem:soportedb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/